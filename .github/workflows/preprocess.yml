name: Preprocess Data

on:
  push:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - id: check_data
        name: Check for data
        run: |
          if [ -f "data/raw/kaggle_scada.csv" ]; then
            echo "has_data=true" >> "$GITHUB_OUTPUT"
            echo "✓ Dataset found - preprocessing will run"
          else
            echo "has_data=false" >> "$GITHUB_OUTPUT"
            echo "⚠ Dataset not found - skipping preprocessing"
          fi

      - name: Install dependencies
        if: steps.check_data.outputs.has_data == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run preprocessing
        if: steps.check_data.outputs.has_data == 'true'
        run: |
          cd preprocessing && python run_pipeline.py
