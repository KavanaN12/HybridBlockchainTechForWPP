name: Production Deployment

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'sync/**'
      - 'blockchain/**'
      - 'requirements.txt'
  workflow_dispatch:

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    name: Test & Validate Code
    permissions:
      contents: read
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pylint
      
      - name: Run linting
        run: |
          pylint sync/*.py dashboard/*.py
      
      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short
      
      - name: Check syntax
        run: |
          python -m py_compile sync/*.py dashboard/*.py

  build-docker:
    runs-on: ubuntu-latest
    name: Build Docker Image
    needs: test-and-validate
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        run: |
          docker build -t wpp-digital-twin:${{ github.sha }} .
          docker build -t wpp-digital-twin:latest .
      
      - name: Test Docker build
        run: |
          docker images | grep wpp-digital-twin

  blockchain-validation:
    runs-on: ubuntu-latest
    name: Validate Smart Contracts
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install Hardhat
        run: |
          cd blockchain
          npm install --legacy-peer-deps
      
      - name: Compile contracts
        run: |
          cd blockchain
          npx hardhat compile
      
      - name: Check contract size
        run: |
          cd blockchain
          npx hardhat size-contracts || true

  deployment-readiness:
    runs-on: ubuntu-latest
    name: Check Deployment Readiness
    needs: [test-and-validate, build-docker, blockchain-validation]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify deployment files
        run: |
          echo "✓ Checking required files..."
          [ -f requirements.txt ] && echo "✓ requirements.txt exists"
          [ -f Dockerfile ] && echo "✓ Dockerfile exists"
          [ -d dashboard ] && echo "✓ dashboard/ exists"
          [ -d sync ] && echo "✓ sync/ exists"
          [ -d blockchain ] && echo "✓ blockchain/ exists"
      
      - name: Generate deployment manifest
        run: |
          echo "=== DEPLOYMENT MANIFEST ===" > deployment-manifest.txt
          echo "SHA: ${{ github.sha }}" >> deployment-manifest.txt
          echo "Branch: ${{ github.ref }}" >> deployment-manifest.txt
          echo "Date: $(date)" >> deployment-manifest.txt
      
      - name: Upload manifest
        uses: actions/upload-artifact@v3
        with:
          name: deployment-manifest
          path: deployment-manifest.txt

  notify:
    runs-on: ubuntu-latest
    name: Notify Deployment Status
    needs: deployment-readiness
    if: always()
    
    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.deployment-readiness.result }}" == "success" ]; then
            echo "✅ DEPLOYMENT READY - All checks passed"
            echo "Next: Use the built container image from GHCR or deploy locally with Docker"
          else
            echo "❌ DEPLOYMENT BLOCKED - Fix failing checks"
          fi
