name: Build and Publish Container

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    name: Test & Validate Code

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pylint

      - name: Run linting
        run: |
          pylint sync/*.py dashboard/*.py --exit-zero

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

  build-and-publish:
    needs: test-and-validate
    runs-on: ubuntu-latest
    name: Build and Publish Docker Image

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/wpp-digital-twin:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/wpp-digital-twin:latest

      - name: Publish build manifest
        run: |
          echo "IMAGE_URI=ghcr.io/${{ github.repository_owner }}/wpp-digital-twin:${{ github.sha }}" > deployment-info.env
          echo "IMAGE_LATEST=ghcr.io/${{ github.repository_owner }}/wpp-digital-twin:latest" >> deployment-info.env

      - name: Upload deployment manifest
        uses: actions/upload-artifact@v4
        with:
          name: container-deployment-info
          path: deployment-info.env
