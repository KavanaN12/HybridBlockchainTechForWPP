name: Deploy to Azure

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'sync/**'
      - 'blockchain/**'
      - 'requirements.txt'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    name: Test & Validate Code
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pylint
      
      - name: Run linting
        run: |
          pylint sync/*.py dashboard/*.py --exit-zero
      
      - name: Run tests
        run: |
          pytest tests/ -v --tb=short || true

  build-and-push:
    runs-on: ubuntu-latest
    name: Build & Push to ACR
    needs: test-and-validate
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Build and push to ACR
        run: |
          az acr build \
            --registry wppdigitaltwin \
            --image wpp-digital-twin:${{ github.sha }} \
            --image wpp-digital-twin:latest \
            .
      
      - name: Verify image pushed
        run: |
          az acr repository list --name wppdigitaltwin

  deploy-to-azure:
    runs-on: ubuntu-latest
    name: Deploy to App Service
    needs: build-and-push
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Update App Service with new image
        uses: azure/webapps-deploy@v2
        with:
          app-name: wpp-dashboard
          images: wppdigitaltwin.azurecr.io/wpp-digital-twin:${{ github.sha }}
      
      - name: Restart App Service
        run: |
          az webapp restart \
            --resource-group wpp-rg \
            --name wpp-dashboard

  health-check:
    runs-on: ubuntu-latest
    name: Health Check
    needs: deploy-to-azure
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Wait for deployment
        run: sleep 30
      
      - name: Check app status
        run: |
          STATUS=$(az webapp show \
            --resource-group wpp-rg \
            --name wpp-dashboard \
            --query "state" \
            -o tsv)
          
          if [ "$STATUS" = "Running" ]; then
            echo "✅ Deployment Successful"
            echo "Dashboard: https://wpp-dashboard.azurewebsites.net"
          else
            echo "❌ Deployment Failed - Status: $STATUS"
            exit 1
          fi
      
      - name: Check Application Insights
        run: |
          az monitor app-insights metrics show \
            --app wpp-insights \
            --resource-group wpp-rg \
            --metric RequestsCount || true

  notify-slack:
    runs-on: ubuntu-latest
    name: Notify Deployment Status
    needs: health-check
    if: always()
    
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "WPP Digital Twin Deployment Status",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*WPP Digital Twin - Azure Deployment*\n✅ All checks passed\n📦 Docker image pushed to ACR\n🚀 App Service updated\n🔗 Dashboard: https://wpp-dashboard.azurewebsites.net"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
